name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        run: pip install uv
      - name: Install package and dev deps
        run: uv pip install --system -e ".[dev]"
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: Mypy
        # mypy's target is pinned to python_version = 3.11 in pyproject.toml,
        # so only the 3.11 leg's environment matches it. Newer legs resolve
        # 3.12+-only dependency versions (e.g. numpy) whose stubs use PEP 695
        # syntax that the 3.11 grammar rejects.
        if: matrix.python-version == '3.11'
        run: mypy --strict docket
      - name: Pytest
        run: pytest -v
