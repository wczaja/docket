services:
  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: docket-phoenix
    ports:
      - "6006:6006"
      - "4317:4317"
    environment:
      PHOENIX_WORKING_DIR: /mnt/phoenix
    volumes:
      - phoenix-data:/mnt/phoenix
    healthcheck:
      # The Phoenix image ships no wget/curl, so shelling out to them leaves the
      # container permanently "unhealthy" even while it serves fine. Use the
      # bundled Python interpreter (the image's entrypoint) instead.
      test:
        - CMD
        - python3
        - -c
        - import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:6006', timeout=3).status < 500 else 1)
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  langfuse-db:
    image: postgres:16-alpine
    container_name: docket-langfuse-db
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfuse-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 3s
      retries: 20

  langfuse:
    image: langfuse/langfuse:2
    container_name: docket-langfuse
    depends_on:
      langfuse-db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: dev-secret-not-for-production
      SALT: dev-salt-not-for-production
      TELEMETRY_ENABLED: "false"
      LANGFUSE_INIT_ORG_ID: docket-org
      LANGFUSE_INIT_PROJECT_ID: docket-project
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: pk-lf-dev
      LANGFUSE_INIT_PROJECT_SECRET_KEY: sk-lf-dev
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/public/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

volumes:
  phoenix-data:
  langfuse-pgdata:
