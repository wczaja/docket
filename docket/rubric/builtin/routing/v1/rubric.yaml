apiVersion: docket.dev/v1
kind: Rubric
metadata:
  name: routing-builtin
  version: 1.0.0
  description: |
    Router / supervisor failure modes for agent topologies where a
    front-line agent picks a downstream specialist (or tool) and hands
    off. Covers wrong-skill routing, capability mismatch (right specialist
    but wrong tool inside it), dead-end transfers (specialist accepts but
    cannot complete), and oscillation between specialists.

    Synthetic baseline. Compose with `agents/v1` for full coverage of a
    supervisor + specialist topology.

modes:
  - id: wrong-skill-routing
    name: Wrong-Skill Routing
    description: |
      Supervisor routed the user's request to a specialist whose
      advertised skill set does not match the request's intent. The
      specialist then either refuses, attempts and fails, or produces
      an irrelevant answer.
    severity: high
    detection:
      type: llm_judge
      prompt: |
        Examine the user's request, the supervisor's routing decision
        (which specialist it picked), and the specialist's advertised
        skill description.

        Return positive=true if the chosen specialist's skill set
        clearly does not cover the user's intent.
      output_schema:
        type: object
        required: [positive, confidence]
        properties:
          positive: {type: boolean}
          chosen_specialist: {type: [string, "null"]}
          expected_specialist: {type: [string, "null"]}
          confidence: {type: number, minimum: 0, maximum: 1}
    examples:
      - trace_excerpt: "User: 'Refund my last order.' Supervisor routed to billing_lookup_specialist (advertised: 'Look up invoices, billing history, payment methods'). billing_lookup_specialist replied: 'I cannot process refunds.'"
        context: "Refunds belong to refunds_specialist, not billing_lookup."
        expected: positive
      - trace_excerpt: "User: 'What is my last invoice total?' Supervisor routed to billing_lookup_specialist. billing_lookup_specialist returned the invoice."
        context: "Skill match is correct."
        expected: negative

  - id: capability-mismatch
    name: Capability Mismatch
    description: |
      Specialist was the right choice for the intent, but the tool the
      specialist invoked inside its own boundary doesn't actually
      support the parameters the user requested (date range too wide,
      currency not supported, account type out of scope, etc.).
    severity: high
    detection:
      type: llm_judge
      prompt: |
        Examine the tool call the specialist made and the tool's
        documented parameter constraints (date ranges, currencies,
        account types, regions, file sizes, etc.).

        Return positive=true if the tool was called with arguments
        outside its supported envelope, and the resulting error wasn't
        surfaced to the user with a helpful explanation.
      output_schema:
        type: object
        required: [positive, confidence]
        properties:
          positive: {type: boolean}
          tool_name: {type: [string, "null"]}
          unsupported_argument: {type: [string, "null"]}
          confidence: {type: number, minimum: 0, maximum: 1}
    examples:
      - trace_excerpt: "Specialist called get_transactions(start='2019-01-01', end='2025-01-01') against a tool that documents 'Max 1-year date window'. Tool returned error 400; specialist replied: 'Sorry, something went wrong.'"
        context: "Tool supports 1-year max; specialist passed a 6-year window."
        expected: positive
      - trace_excerpt: "Specialist called get_transactions(start='2024-11-01', end='2024-12-01') and returned the result."
        context: "Within the tool's documented envelope."
        expected: negative

  - id: dead-end-transfer
    name: Dead-End Transfer
    description: |
      Supervisor handed off to a specialist who accepted the handoff but
      could not complete the task, and instead returned a generic
      apology rather than escalating back to the supervisor or to a
      human. The user is left without a path forward.
    severity: high
    detection:
      type: llm_judge
      prompt: |
        Determine whether the specialist accepted a handoff and then
        terminated the conversation with a non-actionable response
        (e.g. "I'm not able to help with that", "Please try again
        later") without escalating, suggesting an alternative
        specialist, or offering a human-handoff path.

        Return positive=true when the user is left at a dead-end.
      output_schema:
        type: object
        required: [positive, confidence]
        properties:
          positive: {type: boolean}
          terminating_specialist: {type: [string, "null"]}
          confidence: {type: number, minimum: 0, maximum: 1}
    examples:
      - trace_excerpt: "Supervisor handed off to refunds_specialist. refunds_specialist replied: 'I cannot help with that. Please try again later.' Conversation ended."
        context: "No escalation path; no alternative offered; no human handoff."
        expected: positive
      - trace_excerpt: "Supervisor handed off to refunds_specialist. refunds_specialist replied: 'This refund requires manager approval. I am routing you to a human agent now. Reference: HR-4421.' Conversation ended with a ticket created."
        context: "Specialist couldn't complete but routed to a human with a reference."
        expected: negative

  - id: oscillation
    name: Routing Oscillation
    description: |
      Two or more specialists bounced the user back and forth via
      handoffs without either making progress. Detected by the same
      pair (or set) of specialists appearing in the trace's handoff
      history more than twice without intermediate user input.
    severity: medium
    detection:
      type: llm_judge
      prompt: |
        Examine the sequence of handoffs in the trace. Identify whether
        any specialist appears more than once in the chain *without* a
        user message in between, AND whether the specialist's second
        appearance is preceded by the same handoff that already
        bounced once.

        Return positive=true when this oscillation pattern is present.
      output_schema:
        type: object
        required: [positive, confidence]
        properties:
          positive: {type: boolean}
          oscillation_chain: {type: [string, "null"]}
          confidence: {type: number, minimum: 0, maximum: 1}
    examples:
      - trace_excerpt: "supervisor → billing_specialist → 'this is a refund question' → supervisor → refunds_specialist → 'this is a billing question' → supervisor → billing_specialist (same as before, no user input in between)"
        context: "Three specialists bounce the same request without progress."
        expected: positive
      - trace_excerpt: "supervisor → billing_specialist → resolved → user follow-up → supervisor → refunds_specialist → resolved"
        context: "Two distinct conversations; each specialist handled its scope."
        expected: negative

clustering:
  strategy: per_mode_embedding
  embedding_model: text-embedding-3-small
  similarity_threshold: 0.82
  min_cluster_size: 3

triage:
  auto_post_threshold: never
  default_severity_to_tracker:
    critical: P1
    high: P2
    medium: P3
    low: P4
