apiVersion: docket.dev/v1
kind: Rubric
metadata:
  name: mast-builtin
  version: 1.0.0
  description: |
    Multi-agent coordination failure modes adapted from the MAST taxonomy
    (Cemri et al., "Why Do Multi-Agent LLM Systems Fail?", NeurIPS 2025 —
    arXiv:2503.13657, https://github.com/multi-agent-systems-failure-taxonomy/MAST).
    MAST is an empirically grounded taxonomy of 14 failure modes derived from
    200+ traces across 7 multi-agent frameworks, with strong inter-annotator
    agreement (Cohen's kappa 0.88).

    This rubric ports the subset of MAST modes that are reliably detectable
    from a trace alone, without ground-truth knowledge of the correct task
    outcome — the regime docket runs in (unsupervised, over production
    traces). The definitions are re-expressed in docket's own words; the
    taxonomy is credited to the MAST authors. MAST failure-mode codes are
    cited in each mode's name for traceability back to the paper.

    Modes deliberately omitted from this subset (they need task context or a
    notion of "correct output" to judge well, and are better added per-domain
    with a tuned prompt): FM-1.1 Disobey Task Specification, FM-2.3 Task
    Derailment, FM-2.4 Information Withholding, FM-3.2 Weak Verification,
    FM-3.3 No/Incorrect Verification. Two further MAST modes are already
    covered by other builtins: FM-1.2 Disobey Role Specification
    (`multi-agent/v1` -> `role-drift`) and FM-3.1 Premature Termination
    (`agents/v1` -> `premature-termination`).

    Synthetic baseline. Severities are starting points — tune per topology.
    Composes with `agents/v1`, `routing/v1`, and `multi-agent/v1`:

        imports:
          - docket.dev/builtin/agents/v1
          - docket.dev/builtin/multi-agent/v1
          - docket.dev/builtin/mast/v1

modes:
  - id: step-repetition
    name: Step Repetition (MAST FM-1.3)
    description: |
      An agent re-did work it had already completed — re-issuing the same
      tool call, re-running a plan step, or repeating a reasoning turn
      nearly verbatim — with no new information justifying the repeat.
      Wastes turns and tokens and can stall progress. Distinct from
      `agents/v1`'s `infinite-loop`, which is a raw span-count threshold:
      this is semantic repetition that fires well below a runaway-loop
      count. MAST FM-1.3.
    severity: medium
    detection:
      type: llm_judge
      prompt: |
        Examine the sequence of agent steps in the trace (reasoning turns,
        plan steps, and tool calls). Identify whether any step substantively
        repeats one already completed earlier — the same tool call with the
        same arguments, or a reasoning turn that restates an earlier one
        nearly verbatim — without new information (a new error, new tool
        output, or new user input) that would justify redoing it.

        Return positive=true only when a completed step is repeated with no
        justifying change. Legitimate retries after a failure or a changed
        input are negative.
      output_schema:
        type: object
        required: [positive, confidence]
        properties:
          positive: {type: boolean}
          repeated_step: {type: [string, "null"]}
          confidence: {type: number, minimum: 0, maximum: 1}
    examples:
      - trace_excerpt: "planner step 3: 'Thought: examine config.py to find the root cause, then reproduce the bug.' planner step 4 (no new tool output in between): 'Thought: examine config.py to find the root cause, then reproduce the bug.'"
        context: "The planner emitted the identical thought twice with nothing happening in between."
        expected: positive
      - trace_excerpt: "agent called get_invoice(id=12) -> 500 error. agent called get_invoice(id=12) again -> success."
        context: "The repeat is a retry after a transient failure, justified by the prior error."
        expected: negative

  - id: conversation-history-loss
    name: Loss of Conversation History (MAST FM-1.4)
    description: |
      The agent unexpectedly dropped earlier context — truncating or
      ignoring recent turns and reverting to an earlier conversational
      state — so it re-handled settled points or contradicted facts already
      established in the dialogue. Broader than `multi-agent/v1`'s
      `handoff-context-loss`, which is specific to a hand-off boundary: this
      also covers within-agent truncation or reversion. MAST FM-1.4.
    severity: high
    detection:
      type: llm_judge
      prompt: |
        Read the conversation in order. Identify whether the agent at some
        point lost earlier context that it had clearly received — for
        example, re-asking for information already provided, re-introducing
        itself mid-task, or contradicting a fact or decision established
        earlier in the same conversation — as if the recent history had been
        truncated or forgotten.

        Return positive=true when the agent demonstrably reverted to or
        operated without earlier context that was part of the conversation.
      output_schema:
        type: object
        required: [positive, confidence]
        properties:
          positive: {type: boolean}
          dropped_context: {type: [string, "null"]}
          confidence: {type: number, minimum: 0, maximum: 1}
    examples:
      - trace_excerpt: "Turn 1 user: 'Ship to my Berlin office, not home.' ... Turn 6 agent: 'I'll send this to your home address on file. Where would you like it shipped?'"
        context: "The shipping constraint from turn 1 was lost; the agent reverted to a default and re-asked."
        expected: positive
      - trace_excerpt: "Turn 1 user: 'Ship to my Berlin office.' ... Turn 6 agent: 'Confirming: shipping to your Berlin office as you asked earlier.'"
        context: "Earlier context retained and referenced."
        expected: negative

  - id: unaware-of-termination
    name: Unaware of Termination Conditions (MAST FM-1.5)
    description: |
      The agent or system failed to recognize a condition that should have
      ended the interaction, continuing with unnecessary turns or actions
      after the task was effectively complete or had become unsatisfiable.
      The mirror image of premature termination: here the system runs on
      instead of stopping, wasting resources and sometimes corrupting a
      correct result with needless further action. MAST FM-1.5.
    severity: medium
    detection:
      type: llm_judge
      prompt: |
        Determine whether the interaction should have terminated at some
        point — the task was completed and verified, or it had become
        clearly unsatisfiable with the available information — and whether
        the agents nonetheless continued (repeating the same instruction,
        taking further actions, or prolonging the dialogue) without that
        continuation serving the task.

        Return positive=true when the system failed to stop at a point where
        stopping was the correct action.
      output_schema:
        type: object
        required: [positive, confidence]
        properties:
          positive: {type: boolean}
          missed_stop_point: {type: [string, "null"]}
          confidence: {type: number, minimum: 0, maximum: 1}
    examples:
      - trace_excerpt: "assistant: 'I cannot solve this without the ribbon length; that information is not available.' proxy: 'Continue. Keep solving until you need to query.' assistant: 'I still cannot — the data is missing.' proxy: 'Continue. Keep solving until you need to query.'"
        context: "The task is unsatisfiable without missing data; the proxy keeps issuing the same continue instruction instead of terminating."
        expected: positive
      - trace_excerpt: "assistant: 'The answer is 42, verified against the constraints.' proxy: 'Solved. Ending the session.'"
        context: "The system recognized completion and terminated."
        expected: negative

  - id: conversation-reset
    name: Conversation Reset (MAST FM-2.1)
    description: |
      A dialogue was unexpectedly restarted from the beginning —
      re-introducing, re-asking the opening question, or re-initializing
      shared state — discarding the progress already made in the
      interaction. Unlike ordinary context loss, the agent behaves as if the
      conversation is starting over. MAST FM-2.1.
    severity: high
    detection:
      type: llm_judge
      prompt: |
        Identify whether, partway through the interaction, an agent restarted
        the dialogue from scratch: replaying its opening greeting, re-asking
        the very first question, or re-initializing state that had already
        been built up — such that work completed before the restart was
        discarded rather than carried forward.

        Return positive=true when such an unwarranted restart occurred.
        A user explicitly asking to start over is negative.
      output_schema:
        type: object
        required: [positive, confidence]
        properties:
          positive: {type: boolean}
          reset_point: {type: [string, "null"]}
          confidence: {type: number, minimum: 0, maximum: 1}
    examples:
      - trace_excerpt: "After three turns gathering the user's order number and issue, the agent replied: 'Hello! Welcome to support. To get started, what is your order number?' — re-asking what was already given."
        context: "The agent restarted the intake flow, discarding the order number and issue already collected."
        expected: positive
      - trace_excerpt: "User: 'Actually, let's start over with a different order.' Agent: 'Sure — what's the new order number?'"
        context: "The restart was explicitly requested by the user."
        expected: negative

  - id: no-clarification-request
    name: Fail to Ask for Clarification (MAST FM-2.2)
    description: |
      Faced with missing, ambiguous, or contradictory information, the agent
      proceeded on an unstated assumption instead of asking the user (or
      another agent) to clarify, leading to — or risking — a wrong action.
      The failure is acting under genuine ambiguity, not the act of making a
      reasonable, clearly-safe default. MAST FM-2.2.
    severity: medium
    detection:
      type: llm_judge
      prompt: |
        Determine whether the request contained genuinely ambiguous,
        missing, or contradictory information that materially affected what
        the agent should do, AND whether the agent proceeded to act on an
        unstated assumption rather than asking for clarification.

        Return positive=true only when (a) the ambiguity was real and
        material and (b) the agent acted anyway without clarifying. If the
        needed information was actually available, or the default the agent
        chose was clearly safe and reversible, return negative.
      output_schema:
        type: object
        required: [positive, confidence]
        properties:
          positive: {type: boolean}
          ambiguous_point: {type: [string, "null"]}
          confidence: {type: number, minimum: 0, maximum: 1}
    examples:
      - trace_excerpt: "User: 'Cancel my subscription.' The account has two active subscriptions (Pro and Storage). Agent: 'Done — I've cancelled your subscription.' (cancelled Pro)"
        context: "Which subscription was ambiguous and the action is consequential; the agent guessed instead of asking."
        expected: positive
      - trace_excerpt: "User: 'Cancel my subscription.' The account has two active subscriptions. Agent: 'You have two active subscriptions, Pro and Storage. Which would you like to cancel?'"
        context: "The agent recognized the ambiguity and asked before acting."
        expected: negative

  - id: ignored-agent-input
    name: Ignored Other Agent's Input (MAST FM-2.5)
    description: |
      One agent supplied a relevant suggestion, correction, result, or
      constraint, and another agent proceeded as if it had not been provided
      — neither incorporating it nor acknowledging why it was set aside —
      leading to a worse outcome, a repeated mistake, or stalled progress.
      Distinct from `multi-agent/v1`'s `conflicting-instructions` (two agents
      contradicting the user): here one agent silently disregards another.
      MAST FM-2.5.
    severity: high
    detection:
      type: llm_judge
      prompt: |
        Identify cases where one agent produced input clearly directed at
        another — a recommendation, a correction, a computed result, a flagged
        problem — and the receiving agent then acted without incorporating or
        addressing it, as though the input had not been given.

        Return positive=true when relevant agent input was disregarded with
        no rationale. An agent explicitly considering and reasonably rejecting
        the input is negative.
      output_schema:
        type: object
        required: [positive, confidence]
        properties:
          positive: {type: boolean}
          ignored_input: {type: [string, "null"]}
          confidence: {type: number, minimum: 0, maximum: 1}
    examples:
      - trace_excerpt: "reviewer_agent: 'The login handler is missing a null check on `user`; it will crash on logged-out requests.' coder_agent then submitted the same handler unchanged and marked the task complete."
        context: "A specific, actionable correction was raised and then disregarded without comment."
        expected: positive
      - trace_excerpt: "reviewer_agent: 'Consider memoizing this call.' coder_agent: 'Noted, but the input set is tiny and memoization adds complexity here, so I'm leaving it.'"
        context: "The input was considered and rejected with an explicit, reasonable rationale."
        expected: negative

  - id: action-reasoning-mismatch
    name: Action-Reasoning Mismatch (MAST FM-2.6)
    description: |
      A discrepancy between an agent's stated reasoning or decision and the
      action or output it actually produced — concluding one thing then
      doing another, or a tool call whose arguments contradict the agent's
      own stated plan. Erodes reliability and makes the system hard to
      debug, because the visible rationale no longer explains the behavior.
      MAST FM-2.6.
    severity: high
    detection:
      type: llm_judge
      prompt: |
        Compare each agent's stated reasoning or decision with the action or
        output that immediately followed it. Identify a material mismatch:
        the agent concludes one course of action and then takes a different
        one, calls a tool with arguments that contradict its own stated
        intent, or asserts a fact that contradicts what it just established.

        Return positive=true when the action or output materially diverges
        from the reasoning the agent stated for it.
      output_schema:
        type: object
        required: [positive, confidence]
        properties:
          positive: {type: boolean}
          mismatch: {type: [string, "null"]}
          confidence: {type: number, minimum: 0, maximum: 1}
    examples:
      - trace_excerpt: "agent: 'The cached balance is still valid, so I will reuse it and skip another lookup.' Next step: agent called fetch_balance(account=10) and overwrote the cached value."
        context: "The action (re-fetching) directly contradicts the stated decision to reuse the cache."
        expected: positive
      - trace_excerpt: "agent: 'The cache may be stale, so I'll re-fetch the balance.' Next step: agent called fetch_balance(account=10)."
        context: "The action matches the stated reasoning."
        expected: negative

clustering:
  strategy: per_mode_embedding
  embedding_model: text-embedding-3-small
  similarity_threshold: 0.82
  min_cluster_size: 3

triage:
  auto_post_threshold: never
  default_severity_to_tracker:
    critical: P1
    high: P2
    medium: P3
    low: P4
