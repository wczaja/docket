apiVersion: agent-triage.dev/v1
kind: Rubric
metadata:
  name: multi-agent-builtin
  version: 1.0.0
  description: |
    Multi-agent coordination failure modes for swarms, debate topologies,
    and any setup where multiple agents share state. Covers context loss
    on handoff (already partially in `agents/v1`, deepened here),
    conflicting instructions between cooperating agents, role drift
    (specialist takes on the supervisor's framing), and shared-memory
    corruption (one agent overwrites another's working notes).

    Composes with `agents/v1` and `routing/v1`. Use this rubric when you
    have more than two agents collaborating.

modes:
  - id: handoff-context-loss
    name: Handoff Context Loss
    description: |
      An agent handed off to another agent but failed to forward
      critical context (account ID, user constraint, prior decision,
      retrieved document). The receiving agent then asked the user to
      re-supply information they had already given upstream.
    severity: high
    detection:
      type: llm_judge
      prompt: |
        Examine the user's original message and the receiving agent's
        first reply after handoff. Determine whether the receiving
        agent asked the user for information that was already
        explicitly stated upstream (account ID, date, name, location,
        constraint).

        Return positive=true when the receiving agent re-asks for
        upstream-known context.
      output_schema:
        type: object
        required: [positive, confidence]
        properties:
          positive: {type: boolean}
          missing_context_key: {type: [string, "null"]}
          confidence: {type: number, minimum: 0, maximum: 1}
    examples:
      - trace_excerpt: "User to triage_agent: 'My account is 99412 and I cannot log in.' triage_agent handed off to auth_specialist. auth_specialist's first reply: 'Sure, can you give me your account number?'"
        context: "Account ID was already in the user's first message."
        expected: positive
      - trace_excerpt: "User to triage_agent: 'My account is 99412 and I cannot log in.' triage_agent handed off to auth_specialist (with account_id=99412 in payload). auth_specialist's first reply: 'I see account 99412. Let me check the auth logs.'"
        context: "Context forwarded; receiving agent acknowledged it."
        expected: negative

  - id: conflicting-instructions
    name: Conflicting Instructions
    description: |
      Two cooperating agents gave the user contradictory directives
      ("refund denied" from one, "refund approved" from another) within
      the same conversation, often because they're working from
      different stale copies of state or different policy versions.
    severity: critical
    detection:
      type: llm_judge
      prompt: |
        Read the full conversation. Identify statements from different
        agents (by speaker) that directly contradict each other on a
        material outcome: yes/no decisions, approve/deny verdicts,
        dollar amounts, dates, account-status claims.

        Return positive=true when two agents materially contradict.
      output_schema:
        type: object
        required: [positive, confidence]
        properties:
          positive: {type: boolean}
          contradicting_statements: {type: [string, "null"]}
          confidence: {type: number, minimum: 0, maximum: 1}
    examples:
      - trace_excerpt: "refunds_specialist: 'Your refund of $49 has been approved and will appear in 3-5 days.' Later in the same conversation, billing_specialist: 'I see no refund on your account; you'll need to contact support to start one.'"
        context: "Two specialists contradict on whether a refund exists."
        expected: positive
      - trace_excerpt: "refunds_specialist: 'Your refund of $49 has been approved.' billing_specialist: 'I can confirm refund REF-1234 for $49 is in processing.'"
        context: "Two specialists are consistent — one decided, one confirmed."
        expected: negative

  - id: role-drift
    name: Role Drift
    description: |
      A specialist agent began behaving as if it were the supervisor
      (delegating to other specialists, making top-level routing
      decisions outside its advertised scope) or vice versa, breaking
      the topology's control flow.
    severity: medium
    detection:
      type: llm_judge
      prompt: |
        Identify the role of the agent speaking in the trace (look at
        its system prompt or its advertised name). Determine whether
        any of its actions step outside that role: a specialist
        invoking handoff-to-another-specialist tools (instead of
        returning to supervisor), or a supervisor doing work that
        belongs to a specialist.

        Return positive=true on role drift.
      output_schema:
        type: object
        required: [positive, confidence]
        properties:
          positive: {type: boolean}
          drifted_agent: {type: [string, "null"]}
          drift_type: {type: [string, "null"]}
          confidence: {type: number, minimum: 0, maximum: 1}
    examples:
      - trace_excerpt: "refunds_specialist (advertised scope: 'Process refunds') invoked handoff_to_legal_specialist directly, bypassing the supervisor's routing logic."
        context: "Specialists are expected to return control to supervisor for cross-specialist handoffs."
        expected: positive
      - trace_excerpt: "refunds_specialist processed the refund and returned control to supervisor with summary='refund approved, no escalation needed'."
        context: "Specialist stayed in its lane."
        expected: negative

  - id: shared-memory-corruption
    name: Shared-Memory Corruption
    description: |
      In a topology with shared working memory (a scratchpad, a virtual
      filesystem, a shared state object), one agent overwrote another
      agent's note instead of appending, causing the second agent to
      operate on incomplete context. Often a sign of a missing
      append-only convention or missing per-agent namespace.
    severity: high
    detection:
      type: llm_judge
      prompt: |
        Examine writes to shared memory in the trace. Identify cases
        where one agent's write replaced (rather than appended to) a
        prior agent's note, and the second agent's subsequent action
        suggests it operated without the overwritten content.

        Return positive=true when overwriting occurred and a downstream
        agent acted on the truncated view.
      output_schema:
        type: object
        required: [positive, confidence]
        properties:
          positive: {type: boolean}
          overwritten_key: {type: [string, "null"]}
          confidence: {type: number, minimum: 0, maximum: 1}
    examples:
      - trace_excerpt: "agent_a wrote shared.notes='User wants refund AND account closure.' agent_b later wrote shared.notes='Processing refund.' (overwrote). agent_c read shared.notes, processed the refund, and ended the session without closing the account."
        context: "Account closure context was lost when agent_b overwrote the shared note."
        expected: positive
      - trace_excerpt: "agent_a appended to shared.notes. agent_b appended again. agent_c read the full appended list and addressed every item."
        context: "Proper append-only discipline; nothing lost."
        expected: negative

clustering:
  strategy: per_mode_embedding
  embedding_model: text-embedding-3-small
  similarity_threshold: 0.82
  min_cluster_size: 3

triage:
  auto_post_threshold: never
  default_severity_to_tracker:
    critical: P1
    high: P2
    medium: P3
    low: P4
