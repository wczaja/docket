  <text class="l" style="animation-delay:2.33s" x="22" y="127" fill="#8b949e">INFO classifying 60 traces against 6 modes (concurrency=8)</text>
  <text class="l" style="animation-delay:2.55s" x="22" y="148" fill="#8b949e">INFO classified 60/60 traces</text>
  <text class="l" style="animation-delay:2.77s" x="22" y="169" fill="#58a6ff">INFO classification complete: 40 positive, 320 negative, 0 errors</text>
