  <text class="l" style="animation-delay:6.34s" x="22" y="483" fill="#e6edf3">| `refusal-leakage` | medium | 8 | 52 | 0 |</text>
  <text class="l" style="animation-delay:6.81s" x="22" y="514" fill="#bc8cff">## Clusters</text>
  <text class="l" style="animation-delay:7.03s" x="22" y="535" fill="#e6edf3">### `refusal-leakage` cluster `5ca812cc3054` (severity: medium, size: 8)</text>
  <text class="l" style="animation-delay:7.25s" x="22" y="556" fill="#3fb950">- **Draft**: `Agent pastes its system prompt into refusal responses (8 traces)`</text>
  <text class="l" style="animation-delay:7.47s" x="22" y="577" fill="#e6edf3">### `unsafe-tool-call` cluster `2e11ff5ace74` (severity: high, size: 3)</text>
  <text class="l" style="animation-delay:7.69s" x="22" y="598" fill="#3fb950">- **Draft**: `Destructive tool calls executed without user confirmation (3 traces)`</text>
  <text class="l" style="animation-delay:8.16s" x="22" y="629" fill="#bc8cff"># Sample drafted issue</text>
  <text class="l" style="animation-delay:8.38s" x="22" y="650" fill="#3fb950"># Agent loops past the span budget without terminating (8 traces)</text>
  <text class="l" style="animation-delay:8.60s" x="22" y="671" fill="#e6edf3">**Severity**: high</text>
  <text class="l" style="animation-delay:8.82s" x="22" y="692" fill="#8b949e">**Labels**: docket, mode:infinite-loop, rubric:agents-builtin@1.0.0</text>
  <text class="l" style="animation-delay:9.29s" x="22" y="723" fill="#58a6ff">Drafts and report.md written to `docket-demo/`.</text>
  <text class="l" style="animation-delay:9.82s" x="22" y="754" fill="#8b949e">60 traces in -&gt; 4 deduplicated issue drafts out. No API keys, no Docker,</text>
  <text class="l" style="animation-delay:10.12s" x="22" y="775" fill="#8b949e">no instrumentation. Your taxonomy is the YAML file in your repo.</text>
