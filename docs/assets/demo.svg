  <text class="l" style="animation-delay:4.56s" x="22" y="326" fill="#e6edf3">- **Issues drafted**: 4</text>
  <text class="l" style="animation-delay:5.03s" x="22" y="357" fill="#bc8cff">## Frequency by mode</text>
  <text class="l" style="animation-delay:5.25s" x="22" y="378" fill="#8b949e">| mode | severity | positive | negative | error |</text>
  <text class="l" style="animation-delay:5.46s" x="22" y="399" fill="#f85149">| `hallucination` | critical | 8 | 52 | 0 |</text>
  <text class="l" style="animation-delay:5.68s" x="22" y="420" fill="#d29922">| `infinite-loop` | high | 8 | 52 | 0 |</text>
  <text class="l" style="animation-delay:5.90s" x="22" y="441" fill="#d29922">| `premature-termination` | high | 8 | 52 | 0 |</text>
